name: WeatherFast (Windows)

# Adopted from QuickMail's release workflow, adapted to Python/PyInstaller +
# Inno Setup. Pushing a `windows-v<semver>` tag (e.g. windows-v3.0.0) builds the
# app and installer and publishes a GitHub Release with both assets. The tag is
# Windows-specific so it never collides with this repo's iOS/web release tags,
# and the in-app updater only looks at `windows-v*` releases. Pull requests that
# touch the Windows app build (and run tests) but never publish a release.

on:
  push:
    tags: ['windows-v*']
  pull_request:
    paths:
      - 'windows/**'
      - 'installer/**'
      - '.github/workflows/windows-release.yml'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # request the OIDC token azure/login exchanges for Azure creds

jobs:
  build:
    runs-on: windows-latest
    # Runs in the `azure-signing` environment so the OIDC token's subject is
    # repo:kellylford/WeatherFast:environment:azure-signing, which the Azure
    # federated credential trusts (wildcard tag subjects aren't supported in this
    # tenant). This is ONLY a claim-matching mechanism, not a deployment gate — do
    # not add protection rules to this environment or every build, including PRs,
    # will require approval. Signing still only runs on windows-v* tags (below).
    environment: azure-signing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: windows
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Run tests
        working-directory: windows
        run: python -m unittest discover -s tests -t . -v

      # The tag is the single source of truth for the release version and must
      # match the package __version__, which the in-app updater compares against.
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/windows-v')
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}' -replace '^windows-v', ''
          $init = Get-Content windows/fastweather/__init__.py -Raw
          if ($init -notmatch '__version__\s*=\s*"([^"]+)"') { throw "Could not read __version__" }
          $ver = $Matches[1]
          if ($tag -ne $ver) {
            throw "Tag '$tag' does not match __version__ '$ver'. Bump __init__.py or re-tag."
          }
          Write-Host "Version OK: $ver"

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.ref }}' -like 'refs/tags/windows-v*') {
            $v = '${{ github.ref_name }}' -replace '^windows-v', ''
          } else {
            $init = Get-Content windows/fastweather/__init__.py -Raw
            $null = $init -match '__version__\s*=\s*"([^"]+)"'
            $v = $Matches[1]
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version $v"

      - name: Build executable (PyInstaller)
        working-directory: windows
        env:
          PYTHONUTF8: '1'
        run: python build.py

      # --- Code signing (release/tag builds only) ----------------------------
      # Azure Artifact Signing (formerly Trusted Signing). Auth is GitHub OIDC —
      # no signing cert or long-lived secret is stored; azure/login exchanges the
      # workflow's OIDC token for a short-lived Azure credential. The .exe is
      # signed BEFORE Inno Setup runs so both the installed app and the copy
      # bundled in the installer are signed; the installer itself is signed after.
      - name: Azure login (code signing)
        if: ${{ startsWith(github.ref, 'refs/tags/windows-v') || github.event_name == 'workflow_dispatch' }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign WeatherFast.exe
        if: ${{ startsWith(github.ref, 'refs/tags/windows-v') || github.event_name == 'workflow_dispatch' }}
        uses: azure/artifact-signing-action@v2.0.0
        with:
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: kellylford
          certificate-profile-name: kellyford-public
          files-folder: ${{ github.workspace }}\windows\dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
            $iscc = (Get-Command iscc).Source
          }
          & $iscc /DMyAppVersion=${{ steps.ver.outputs.version }} installer/weatherfast.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }

      - name: Sign installer
        if: ${{ startsWith(github.ref, 'refs/tags/windows-v') || github.event_name == 'workflow_dispatch' }}
        uses: azure/artifact-signing-action@v2.0.0
        with:
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: kellylford
          certificate-profile-name: kellyford-public
          files-folder: ${{ github.workspace }}\installer\Output
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WeatherFast-${{ steps.ver.outputs.version }}
          path: |
            windows/dist/WeatherFast.exe
            installer/Output/WeatherFast-*-Setup.exe
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/windows-v')
        uses: softprops/action-gh-release@v2
        with:
          name: WeatherFast ${{ steps.ver.outputs.version }} (Windows)
          generate_release_notes: true
          files: |
            windows/dist/WeatherFast.exe
            installer/Output/WeatherFast-*-Setup.exe
          fail_on_unmatched_files: true
