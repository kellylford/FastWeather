name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ios-tests:
    name: iOS Tests
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - name: Create Secrets.swift
        run: |
          cat > iOS/FastWeather/Services/Secrets.swift << 'EOF'
          enum Secrets {
              static let openMeteoAPIKey: String? = nil
          }
          EOF

      - name: Build and Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project iOS/FastWeather.xcodeproj \
            -scheme FastWeather \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skip-testing:FastWeatherTests/OpenMeteoAPIParameterTests/testForecastDaysUsesCorrectValues \
            -skip-testing:FastWeatherTests/OpenMeteoAPIParameterTests/testLiveAPICallWithCorrectParameters \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

  webapp-tests:
    name: Webapp Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: webapp
        run: npm install

      - name: Run tests with coverage
        working-directory: webapp
        run: npm run test:coverage -- --ci --forceExit

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: webapp/coverage/
