name: iOS App Store Release

# Builds and uploads a FastWeather iOS build to App Store Connect from a
# GitHub-hosted macOS runner. The runner is on RELEASED macOS + a RELEASED
# Xcode/SDK, which sidesteps the "compiled with a beta product" rejection you
# get when building on a beta-OS Mac.
#
# Trigger it manually: Actions tab -> "iOS App Store Release" -> Run workflow.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions).
# See .github/workflows/README-ios-release.md for how to produce each value.
#   ASC_KEY_ID             App Store Connect API key ID
#   ASC_ISSUER_ID          App Store Connect API issuer ID
#   ASC_KEY_P8_BASE64      base64 of the AuthKey_XXXXXXXXXX.p8 file
#   DIST_CERT_P12_BASE64   base64 of the "Apple Distribution" cert + private key (.p12)
#   DIST_CERT_PASSWORD     password you set when exporting that .p12
#   OPENMETEO_API_KEY      (optional) paid Open-Meteo key; omit to ship free tier

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Build number (CURRENT_PROJECT_VERSION), e.g. 5. Must be unused on App Store Connect for this version."
        required: true
        type: string
      marketing_version:
        description: "Marketing version override (leave blank to keep the value in the project, currently 1.5.8)."
        required: false
        type: string

jobs:
  build-upload:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain and reject beta build machine
        run: |
          set -euo pipefail
          echo "=== xcodebuild ==="
          xcodebuild -version
          echo "=== iOS SDK ==="
          xcrun --sdk iphoneos --show-sdk-version
          echo "iOS SDK build:  $(xcrun --sdk iphoneos --show-sdk-build-version)"
          echo "Xcode build:    $(xcodebuild -version | awk '/Build version/{print $3}')"
          # The field Apple actually rejects on is BuildMachineOSBuild - the
          # build number of the macOS the runner is on. Released macOS builds
          # end in a digit (e.g. 24A335); beta seeds end in a lowercase letter
          # (e.g. 26A5378j). GitHub-hosted runners are on released macOS, so
          # this passes - it just guarantees we never ship a beta-OS binary.
          OS_BUILD="$(sw_vers -buildVersion)"
          echo "macOS build:    $OS_BUILD"
          if printf '%s' "$OS_BUILD" | grep -qE '[a-z]$'; then
            echo "::error::Build machine is on a beta macOS ($OS_BUILD); App Store would reject. Aborting."
            exit 1
          fi
          echo "Build machine is on released macOS. Proceeding."

      - name: Recreate Secrets.swift
        env:
          OPENMETEO_API_KEY: ${{ secrets.OPENMETEO_API_KEY }}
          AIRNOW_API_KEY: ${{ secrets.AIRNOW_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p iOS/FastWeather/Services
          # Emit a Swift String? literal: quoted value, or nil when the secret is unset.
          swift_opt() { if [ -n "${1:-}" ]; then printf '"%s"' "$1"; else printf 'nil'; fi; }
          OM=$(swift_opt "${OPENMETEO_API_KEY:-}")
          AN=$(swift_opt "${AIRNOW_API_KEY:-}")
          {
            echo 'enum Secrets {'
            echo "    static let openMeteoAPIKey: String? = ${OM}"
            echo "    static let airNowAPIKey: String? = ${AN}"
            echo '}'
          } > iOS/FastWeather/Services/Secrets.swift
          [ "$OM" = nil ] && echo "::warning::OPENMETEO_API_KEY not set - free tier." || echo "Open-Meteo key set."
          [ "$AN" = nil ] && echo "::warning::AIRNOW_API_KEY not set - air quality observed layer disabled." || echo "AirNow key set."

      - name: Set version and build number
        env:
          BUILD_NUMBER: ${{ inputs.build_number }}
          MARKETING_VERSION: ${{ inputs.marketing_version }}
        run: |
          set -euo pipefail
          PBX=iOS/FastWeather.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9][0-9]*;/CURRENT_PROJECT_VERSION = ${BUILD_NUMBER};/g" "$PBX"
          if [ -n "${MARKETING_VERSION:-}" ]; then
            sed -i '' "s/MARKETING_VERSION = [0-9][0-9.]*;/MARKETING_VERSION = ${MARKETING_VERSION};/g" "$PBX"
          fi
          echo "=== resulting versions ==="
          grep -E 'MARKETING_VERSION|CURRENT_PROJECT_VERSION' "$PBX" | sort -u

      - name: Import signing certificate
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          RUNNER_TMP="${RUNNER_TEMP:-$TMPDIR}"
          KEYCHAIN="$RUNNER_TMP/build.keychain-db"
          KP="$(uuidgen)"   # random one-off keychain password
          echo "$DIST_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TMP/dist.p12"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          security import "$RUNNER_TMP/dist.p12" -k "$KEYCHAIN" -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security list-keychains -d user -s "$KEYCHAIN" "$(security default-keychain | tr -d ' "')"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN" >/dev/null
          rm -f "$RUNNER_TMP/dist.p12"
          echo "Imported identities:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Stage App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$DIR"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$DIR/AuthKey_${ASC_KEY_ID}.p8"
          echo "API_PRIVATE_KEYS_DIR=$DIR" >> "$GITHUB_ENV"
          echo "ASC_KEY_PATH=$DIR/AuthKey_${ASC_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project iOS/FastWeather.xcodeproj \
            -scheme FastWeather \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/FastWeather.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            clean archive

      - name: Export App Store IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/FastWeather.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist iOS/scripts/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
          ls -lh "$RUNNER_TEMP/export/"

      - name: Validate and upload to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          IPA="$(find "$RUNNER_TEMP/export" -maxdepth 1 -name '*.ipa' | head -1)"
          [ -n "$IPA" ] || { echo "::error::no .ipa produced"; exit 1; }
          echo "Validating $IPA"
          xcrun altool --validate-app -t ios -f "$IPA" \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
          echo "Uploading $IPA"
          xcrun altool --upload-app -t ios -f "$IPA" \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload IPA as build artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: FastWeather-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: ignore
